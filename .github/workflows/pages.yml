name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # The Pages build is the local-only (no-backend) variant of the app, so
      # the server-only pieces are removed before the static export.
      - name: Strip server-only pieces
        run: rm -f middleware.ts && rm -rf app/api app/auth

      - name: Build static export
        env:
          STATIC_EXPORT: "1"
          NEXT_PUBLIC_BASE_PATH: /Life-Planner
        run: pnpm build

      - name: Disable Jekyll
        run: touch out/.nojekyll

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
